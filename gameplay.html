<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Adventure | Gameplay!</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://fonts.googleapis.com/css?family=Jersey 20' rel='stylesheet'>
</head>

<body class="gameplay">
    <div class="game">

        <img id="background" src="">


        <!-- inventory test2 here below -->
        <div id="overlay" onclick="off()">
            <div id="insideOverlay">
                <h2>Pokemon Inventory</h2>
                <section id="inventory">
                    <div id="pokemonInventory">
                        <p id="pokemon1"></p>
                        <p id="pokemon2"></p>
                        <p id="pokemon3"></p>
                        <p id="pokemon4"></p>
                        <p id="pokemon5"></p>
                        <p id="pokemon6"></p>
                    </div>

                </section>
                <button id="overlayBtn"><img src="backArrow.png"></button>
            </div>
        </div>




        <!-- options here!! -->
        <img id="img">
        <div id="options"></div>
        <!-- dialougue here!! -->
        <div id="dialogueBox">
            <h2 id="name"></h2>
            <p id="dialogue"></p>


            <button id="nextBtn">Next</button>
        </div>
    </div>
</body>
<script src="app.js"></script>

</html>
