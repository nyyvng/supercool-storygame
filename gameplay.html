<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Adventure | Gameplay!</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://fonts.googleapis.com/css?family=Jersey 20' rel='stylesheet'>
</head>

<body class="gameplay">
    <div class="game">

        <img id="background" src="">


        <!-- inventory test2 here below -->
        <button id="openInventory"><img src="inventory-icon.png"></button>

        <div id="overlay">
            <div id="insideOverlay">
                <h2>Pokemon Inventory</h2>
                <section id="inventory">

                    <section id="pokemonInventory"></section>

                </section>
                <button id="overlayBtn"><img src="backArrow.png"></button>
            </div>
        </div>




        <!-- options here!! -->
        <img id="img">
        <div id="options"></div>
        <!-- dialougue here!! -->
        <div id="dialogueBox">
            <h2 id="name"></h2>
            <p id="dialogue"></p>


            <button id="nextBtn">Next</button>
        </div>

        <!--battle system here-->
        <div id="battleUI">
            <div id="playerHealth"></div>
            <div id="enemyHealth"></div>
            <div id="battleOptions"></div>
        </div>

        <div id="yourpkenc"></div>

        <!--Scene navigation-->
        <small>Scene search here (devs only)</small>
        <input id="navId" type="text">
        <button id="navBtn" type="button">Go</button>

        <!-- return to title button (might need to fix soon!!)-->
        <button id="playAgain">Return to Title</button>
    </div>
</body>
<script src="app.js"></script>

</html>
